<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPSトラッカー</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; }
    #header { background: #2c3e50; color: white; padding: 12px 16px; }
    #header h1 { font-size: 18px; }
    #status { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    #photo-count { font-size: 11px; margin-top: 2px; opacity: 0.7; }
    #controls { display: flex; gap: 8px; padding: 12px 16px; background: white; border-bottom: 1px solid #ddd; }
    button { flex: 1; padding: 14px 4px; border: none; border-radius: 8px; font-size: clamp(13px, 4vw, 16px); font-weight: bold; cursor: pointer; white-space: nowrap; }
    #btnStart { background: #27ae60; color: white; }
    #btnStop  { background: #e74c3c; color: white; }
    #btnPhoto { background: #f39c12; color: white; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #map { height: calc(100vh - 120px); }
    #info { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; z-index: 1000; display: none; }
    .photo-marker { font-size: 24px; text-align: center; line-height: 1; }
    .photo-popup { min-width: 220px; }
    .photo-popup img { max-width: 220px; max-height: 180px; display: block; border-radius: 6px; }
    .photo-popup small { display: block; margin-top: 4px; color: #666; font-size: 11px; }
    .stars { margin: 6px 0 2px; font-size: 24px; line-height: 1; cursor: pointer; }
    .star { color: #ccc; transition: color 0.1s; }
    .star.filled { color: #f39c12; }
    .comment-input { width: 100%; margin: 4px 0; padding: 4px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; resize: none; }
    .save-meta { background: #27ae60; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>📍 GPSルートトラッカー</h1>
    <div id="status">待機中</div>
    <div id="photo-count"></div>
  </div>
  <div id="controls">
    <button id="btnStart" onclick="startTracking()">▶ スタート</button>
    <button id="btnStop"  onclick="stopTracking()" disabled>■ エンド</button>
    <button id="btnPhoto" onclick="document.getElementById('photoInput').click()">📷 写真</button>
    <button id="btnAllPhotos" onclick="showAllPhotos()" style="background:#8e44ad;color:white;">🗺 全表示</button>
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
  <div id="map"></div>
  <div id="info"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/exifr/dist/lite.umd.js"></script>
  <script>
    function getDeviceId() {
      let id = localStorage.getItem('gps_device_id');
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('gps_device_id', id);
      }
      return id;
    }
    const deviceId = getDeviceId();

    const map = L.map('map').setView([43.0646, 141.3468], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let watchId = null;
    let polyline = L.polyline([], { color: '#e74c3c', weight: 4 }).addTo(map);
    let marker = null;
    let points = [];
    const INTERVAL_MS = 5000;
    let lastSent = 0;
    let currentLat = null;
    let currentLng = null;

    const photoIcon = L.divIcon({
      html: '<div style="background:#e67e22;border:2px solid white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 5px rgba(0,0,0,0.5);">📷</div>',
      className: '',
      iconSize: [34, 34],
      iconAnchor: [17, 17],
      popupAnchor: [0, -19],
    });

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function showInfo(text) {
      const el = document.getElementById('info');
      el.textContent = text;
      el.style.display = 'block';
    }

    function buildStars(rating) {
      return [1,2,3,4,5].map(i =>
        `<span class="star ${i <= (rating||0) ? 'filled' : ''}" data-val="${i}">★</span>`
      ).join('');
    }

    function addPhotoMarker(lat, lng, url, timestamp, rating, comment) {
      photoMeta.set(url, { rating: rating || 0, comment: comment || '' });
      const time = new Date(timestamp).toLocaleString('ja-JP');
      const m = L.marker([lat, lng], { icon: photoIcon })
        .bindPopup(`
          <div class="photo-popup" data-url="${url}" data-time="${time}">
            <img src="${url}">
            <div class="stars"></div>
            <textarea class="comment-input" rows="2" placeholder="コメント"></textarea>
            <button class="save-meta">保存</button>
            <small>${time}</small>
          </div>
        `, { maxWidth: 260 })
        .addTo(map);
      return m;
    }

    map.on('popupopen', function(e) {
      const popup = e.popup.getElement().querySelector('.photo-popup');
      if (!popup) return;
      const url = popup.dataset.url;
      const meta = photoMeta.get(url) || { rating: 0, comment: '' };
      let currentRating = meta.rating;

      // 星とコメントを現在の保存値で復元
      popup.querySelector('.stars').innerHTML = buildStars(currentRating);
      popup.querySelector('.comment-input').value = meta.comment;

      // 古いリスナーを除去するためクローン置換
      const starsEl = popup.querySelector('.stars');
      const newStars = starsEl.cloneNode(true);
      starsEl.replaceWith(newStars);
      const saveBtn = popup.querySelector('.save-meta');
      const newSaveBtn = saveBtn.cloneNode(true);
      saveBtn.replaceWith(newSaveBtn);

      newStars.querySelectorAll('.star').forEach(star => {
        star.addEventListener('click', function() {
          currentRating = parseInt(this.dataset.val);
          newStars.querySelectorAll('.star').forEach((s, i) => {
            s.classList.toggle('filled', i < currentRating);
          });
        });
      });

      newSaveBtn.addEventListener('click', function() {
        const comment = popup.querySelector('.comment-input').value;
        fetch('photo-meta', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, rating: currentRating, comment }),
        }).then(r => r.json()).then(() => {
          photoMeta.set(url, { rating: currentRating, comment });
          newSaveBtn.textContent = '✓ 保存済み';
          setTimeout(() => { newSaveBtn.textContent = '保存'; }, 2000);
        }).catch(() => { newSaveBtn.textContent = 'エラー'; });
      });
    });

    let photoMarkers = [];
    const photoMeta = new Map(); // url → {rating, comment}

    function addPhotoMarkerTracked(lat, lng, url, timestamp) {
      const m = addPhotoMarker(lat, lng, url, timestamp);
      if (m) photoMarkers.push(m);
    }

    function showAllPhotos() {
      if (photoMarkers.length === 0) return;
      const bounds = L.latLngBounds(photoMarkers.map(m => m.getLatLng()));
      map.fitBounds(bounds, { padding: [40, 40] });
    }

    // 起動時: 前回位置に移動 + 写真マーカーを読み込む
    fetch(`last-position?deviceId=${encodeURIComponent(deviceId)}`)
      .then(r => r.json())
      .then(pos => { if (pos) map.setView([pos.lat, pos.lng], 13); })
      .catch(() => {});

    fetch(`photos-list?deviceId=${encodeURIComponent(deviceId)}`)
      .then(r => r.json())
      .then(list => {
        list.forEach(p => addPhotoMarkerTracked(p.lat, p.lng, p.url, p.timestamp, p.rating, p.comment));
        document.getElementById('photo-count').textContent =
          `📷 ${list.length}件の写真`;
      })
      .catch(() => {});

    async function sendLocation(lat, lng, speed, accuracy) {
      try {
        await fetch('location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng, speed, accuracy, deviceId })
        });
      } catch (e) {
        console.error('送信エラー:', e);
      }
    }

    function startTracking() {
      if (!navigator.geolocation) {
        alert('このブラウザはGeolocationに対応していません');
        return;
      }
      points = [];
      polyline.setLatLngs([]);
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStop').disabled = false;
      setStatus('トラッキング中...');

      fetch('tracking', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({active: true, deviceId}) });

      watchId = navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lng, speed, accuracy } = pos.coords;
        const now = Date.now();
        currentLat = lat;
        currentLng = lng;

        points.push([lat, lng]);
        polyline.setLatLngs(points);
        map.setView([lat, lng]);

        if (marker) marker.setLatLng([lat, lng]);
        else marker = L.circleMarker([lat, lng], { radius: 8, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 1 }).addTo(map);

        showInfo(`📍 ${lat.toFixed(5)}, ${lng.toFixed(5)} | 精度: ${Math.round(accuracy)}m`);

        if (now - lastSent >= INTERVAL_MS) {
          lastSent = now;
          sendLocation(lat, lng, speed || 0, accuracy);
          setStatus(`送信済み ${new Date().toLocaleTimeString('ja-JP')}`);
        }
      }, err => {
        setStatus('位置情報エラー: ' + err.message);
      }, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      setStatus(`完了 - ${points.length}ポイント記録`);
      fetch('tracking', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({active: false, deviceId}) });
    }

    async function uploadPhoto(input) {
      const file = input.files[0];
      if (!file) return;

      setStatus('EXIF確認中...');

      let lat = null;
      let lng = null;
      let source = '';

      // ① 写真の EXIF GPS を読む
      try {
        const gps = await exifr.gps(file);
        if (gps && gps.latitude && gps.longitude) {
          lat = gps.latitude;
          lng = gps.longitude;
          source = 'EXIF';
        }
      } catch (e) { /* EXIFなし or 非対応フォーマット */ }

      // ② トラッキング中の現在地
      if (lat === null && currentLat !== null) {
        lat = currentLat;
        lng = currentLng;
        source = 'トラッキング位置';
      }

      // ③ ブラウザ位置情報を取得
      if (lat === null) {
        setStatus('現在地取得中...');
        try {
          const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 })
          );
          lat = pos.coords.latitude;
          lng = pos.coords.longitude;
          source = '現在地';
        } catch (e) {
          alert('位置情報を取得できませんでした: ' + e.message);
          setStatus('待機中');
          input.value = '';
          return;
        }
      }

      setStatus(`アップロード中... (${source})`);
      try {
        const formData = new FormData();
        formData.append('photo', file);
        formData.append('lat', lat);
        formData.append('lng', lng);
        formData.append('deviceId', deviceId);

        const resp = await fetch('photo', { method: 'POST', body: formData });
        const data = await resp.json();

        addPhotoMarkerTracked(data.lat, data.lng, data.url, data.timestamp, 0, '');
        map.setView([data.lat, data.lng]);
        setStatus(`写真を追加しました（${source}）`);
      } catch (e) {
        alert('アップロードに失敗しました: ' + e.message);
        setStatus('待機中');
      }
      input.value = '';
    }
  </script>
</body>
</html>
