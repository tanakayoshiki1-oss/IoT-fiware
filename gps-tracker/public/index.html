<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPSトラッカー</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; }
    #header { background: #2c3e50; color: white; padding: 10px 16px; }
    #header-top { display: flex; justify-content: space-between; align-items: center; }
    #header h1 { font-size: 18px; }
    #btnToggle {
      flex: none;
      background: #7f8c8d;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #btnToggle.active { background: #2980b9; }
    #status { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    #photo-count { font-size: 11px; margin-top: 2px; opacity: 0.7; }
    #controls { display: flex; gap: 8px; padding: 12px 16px; background: white; border-bottom: 1px solid #ddd; }
    #controls button { flex: 1; padding: 14px 4px; border: none; border-radius: 8px; font-size: clamp(13px, 4vw, 16px); font-weight: bold; cursor: pointer; white-space: nowrap; }
    #btnStart { background: #27ae60; color: white; }
    #btnStop  { background: #e74c3c; color: white; }
    #btnPhoto { background: #f39c12; color: white; }
    #btnAllPhotos { background: #8e44ad; color: white; }
    #controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    #map { height: calc(100vh - 150px); }
    #info { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; z-index: 1000; display: none; }

    /* 写真ポップアップ */
    .photo-popup { min-width: 220px; }
    .photo-popup img { max-width: 220px; max-height: 160px; display: block; border-radius: 6px; }
    .photo-popup small { display: block; margin-top: 4px; color: #666; font-size: 11px; }

    /* 評価行 */
    .rating-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
    .rating-row .stars { flex: 1; font-size: 22px; line-height: 1; cursor: pointer; }
    .star { color: #ccc; transition: color 0.1s; }
    .star.filled { color: #f39c12; }
    .save-rating { background: #3498db; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; }

    /* チャットエリア */
    .chat-area-header { display: flex; justify-content: space-between; align-items: center; margin: 5px 0 2px; }
    .chat-area-label { font-size: 11px; color: #999; }
    .chat-refresh { background: none; border: none; font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; }
    .chat-area { max-height: 120px; overflow-y: auto; padding: 2px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
    .chat-empty { color: #bbb; font-size: 11px; text-align: center; padding: 6px; }
    .chat-msg { margin: 3px 0; display: flex; flex-direction: column; }
    .chat-msg.mine { align-items: flex-end; }
    .chat-msg.other { align-items: flex-start; }
    .chat-author { font-size: 10px; color: #999; margin-bottom: 1px; }
    .chat-bubble { display: inline-block; padding: 5px 9px; border-radius: 12px; font-size: 12px; max-width: 90%; word-break: break-word; line-height: 1.4; }
    .chat-msg.mine .chat-bubble { background: #27ae60; color: white; border-bottom-right-radius: 4px; }
    .chat-msg.other .chat-bubble { background: #ecf0f1; color: #2c3e50; border-bottom-left-radius: 4px; }
    .chat-time { font-size: 10px; color: #aaa; margin-top: 1px; }

    /* コメント入力行 */
    .chat-input-row { display: flex; gap: 4px; margin-top: 5px; }
    .chat-input { flex: 1; padding: 5px 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
    .chat-send { background: #27ae60; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-top">
      <h1>📍 GPSルートトラッカー</h1>
      <button id="btnToggle" onclick="toggleView()">👤 自分のみ</button>
    </div>
    <div id="status">待機中</div>
    <div id="photo-count"></div>
  </div>
  <div id="controls">
    <button id="btnStart" onclick="startTracking()">▶ スタート</button>
    <button id="btnStop"  onclick="stopTracking()" disabled>■ エンド</button>
    <button id="btnPhoto" onclick="document.getElementById('photoInput').click()">📷 写真</button>
    <button id="btnAllPhotos" onclick="showAllPhotos()">🗺 全表示</button>
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
  <div id="map"></div>
  <div id="info"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/exifr/dist/lite.umd.js"></script>
  <script>
    function getDeviceId() {
      let id = localStorage.getItem('gps_device_id');
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('gps_device_id', id);
      }
      return id;
    }
    const deviceId = getDeviceId();

    const map = L.map('map').setView([43.0646, 141.3468], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let watchId = null;
    let polyline = L.polyline([], { color: '#e74c3c', weight: 4 }).addTo(map);
    let marker = null;
    let points = [];
    const INTERVAL_MS = 5000;
    let lastSent = 0;
    let currentLat = null;
    let currentLng = null;

    const myPhotoIcon = L.divIcon({
      html: '<div style="background:#e67e22;border:2px solid white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 5px rgba(0,0,0,0.5);">📷</div>',
      className: '',
      iconSize: [34, 34],
      iconAnchor: [17, 17],
      popupAnchor: [0, -19],
    });

    const otherPhotoIcon = L.divIcon({
      html: '<div style="background:#2980b9;border:2px solid white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 5px rgba(0,0,0,0.5);">📷</div>',
      className: '',
      iconSize: [34, 34],
      iconAnchor: [17, 17],
      popupAnchor: [0, -19],
    });

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function showInfo(text) {
      const el = document.getElementById('info');
      el.textContent = text;
      el.style.display = 'block';
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function buildStars(rating) {
      return [1,2,3,4,5].map(i =>
        `<span class="star ${i <= (rating||0) ? 'filled' : ''}" data-val="${i}">★</span>`
      ).join('');
    }

    function renderComments(popup, comments) {
      const chatArea = popup.querySelector('.chat-area');
      if (!chatArea) return;
      if (!comments || comments.length === 0) {
        chatArea.innerHTML = '<div class="chat-empty">コメントはまだありません</div>';
        return;
      }
      chatArea.innerHTML = comments.map(c => {
        const isMe = c.deviceId === deviceId;
        const time = new Date(c.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        const author = isMe ? 'あなた' : c.deviceId.slice(0, 6);
        return `
          <div class="chat-msg ${isMe ? 'mine' : 'other'}">
            ${!isMe ? `<div class="chat-author">${escapeHtml(author)}</div>` : ''}
            <div class="chat-bubble">${escapeHtml(c.text)}</div>
            <div class="chat-time">${time}</div>
          </div>
        `;
      }).join('');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addPhotoMarker(lat, lng, url, timestamp, rating, comments, isOwn) {
      photoMeta.set(url, { rating: rating || 0, comments: comments || [] });
      const time = new Date(timestamp).toLocaleString('ja-JP');
      const icon = isOwn ? myPhotoIcon : otherPhotoIcon;
      const m = L.marker([lat, lng], { icon })
        .bindPopup(`
          <div class="photo-popup" data-url="${url}">
            <img src="${url}">
            <div class="rating-row">
              <div class="stars"></div>
              <button class="save-rating">★保存</button>
            </div>
            <div class="chat-area-header">
              <span class="chat-area-label">💬 コメント</span>
              <button class="chat-refresh" title="最新コメントを取得">🔄</button>
            </div>
            <div class="chat-area"></div>
            <div class="chat-input-row">
              <input class="chat-input" type="text" placeholder="コメントを入力...">
              <button class="chat-send">送信</button>
            </div>
            <small>${time}</small>
          </div>
        `, { maxWidth: 260 })
        .addTo(map);
      return m;
    }

    map.on('popupopen', async function(e) {
      // Leaflet が mousedown を地図ドラッグとして横取りするのを防ぐ（PC でのテキスト入力対策）
      const popupEl = e.popup.getElement();
      if (popupEl) {
        L.DomEvent.disableClickPropagation(popupEl);
        L.DomEvent.disableScrollPropagation(popupEl);
      }
      const popup = popupEl && popupEl.querySelector('.photo-popup');
      if (!popup) return;
      const url = popup.dataset.url;

      // サーバーから最新データを取得（他デバイスのコメントも反映）
      let photo;
      try {
        const r = await fetch(`photo-detail?url=${encodeURIComponent(url)}`);
        photo = await r.json();
        photoMeta.set(url, { rating: photo.rating || 0, comments: photo.comments || [] });
      } catch (_) {
        photo = photoMeta.get(url) || { rating: 0, comments: [] };
      }

      let currentRating = photo.rating || 0;

      // 星の初期表示
      popup.querySelector('.stars').innerHTML = buildStars(currentRating);

      // コメント一覧を描画
      renderComments(popup, photo.comments || []);

      // 古いリスナーを除去してからアタッチ
      function reattach(selector) {
        const el = popup.querySelector(selector);
        const clone = el.cloneNode(true);
        el.replaceWith(clone);
        return clone;
      }
      const newStars = reattach('.stars');
      const newSaveRating = reattach('.save-rating');
      const newRefreshBtn = reattach('.chat-refresh');
      const newSendBtn = reattach('.chat-send');
      const chatInput = popup.querySelector('.chat-input');

      async function refreshComments() {
        newRefreshBtn.textContent = '⏳';
        try {
          const r = await fetch(`photo-detail?url=${encodeURIComponent(url)}`);
          const latest = await r.json();
          photoMeta.set(url, { rating: latest.rating || 0, comments: latest.comments || [] });
          renderComments(popup, latest.comments || []);
        } catch (_) {}
        newRefreshBtn.textContent = '🔄';
      }
      newRefreshBtn.addEventListener('click', refreshComments);

      newStars.querySelectorAll('.star').forEach(star => {
        star.addEventListener('click', function() {
          currentRating = parseInt(this.dataset.val);
          newStars.querySelectorAll('.star').forEach((s, i) => {
            s.classList.toggle('filled', i < currentRating);
          });
        });
      });

      newSaveRating.addEventListener('click', function() {
        fetch('photo-meta', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, rating: currentRating }),
        }).then(r => r.json()).then(() => {
          const cached = photoMeta.get(url) || {};
          photoMeta.set(url, { ...cached, rating: currentRating });
          newSaveRating.textContent = '✓保存';
          setTimeout(() => { newSaveRating.textContent = '★保存'; }, 2000);
        }).catch(() => { newSaveRating.textContent = 'エラー'; });
      });

      async function sendComment() {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = '';
        newSendBtn.disabled = true;
        try {
          const r = await fetch('photo-comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, deviceId, text }),
          });
          const entry = await r.json();
          const cached = photoMeta.get(url) || { rating: currentRating, comments: [] };
          const comments = [...(cached.comments || []), entry];
          photoMeta.set(url, { ...cached, comments });
          renderComments(popup, comments);
        } catch (_) {}
        newSendBtn.disabled = false;
      }

      newSendBtn.addEventListener('click', sendComment);
      chatInput.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); sendComment(); }
      });
    });

    let photoMarkers = [];
    let otherMarkers = [];
    let showAll = false;
    const photoMeta = new Map(); // url → {rating, comments}

    function addMyPhotoMarker(lat, lng, url, timestamp, rating, comments) {
      const m = addPhotoMarker(lat, lng, url, timestamp, rating, comments, true);
      if (m) photoMarkers.push(m);
    }

    function addOtherPhotoMarker(lat, lng, url, timestamp, rating, comments) {
      const m = addPhotoMarker(lat, lng, url, timestamp, rating, comments, false);
      if (m) {
        m.remove();
        otherMarkers.push(m);
      }
    }

    function toggleView() {
      showAll = !showAll;
      const btn = document.getElementById('btnToggle');
      if (showAll) {
        otherMarkers.forEach(m => m.addTo(map));
        btn.textContent = '🌐 全員分';
        btn.classList.add('active');
      } else {
        otherMarkers.forEach(m => m.remove());
        btn.textContent = '👤 自分のみ';
        btn.classList.remove('active');
      }
      updatePhotoCount();
    }

    function updatePhotoCount() {
      const myCount = photoMarkers.length;
      const totalCount = myCount + otherMarkers.length;
      if (totalCount === 0) {
        document.getElementById('photo-count').textContent = '';
      } else if (showAll) {
        document.getElementById('photo-count').textContent =
          `📷 全${totalCount}件（自分${myCount} / 他${otherMarkers.length}）`;
      } else {
        document.getElementById('photo-count').textContent =
          `📷 自分${myCount}件（全${totalCount}件）`;
      }
    }

    function showAllPhotos() {
      const visible = showAll
        ? [...photoMarkers, ...otherMarkers]
        : photoMarkers;
      if (visible.length === 0) return;
      const bounds = L.latLngBounds(visible.map(m => m.getLatLng()));
      map.fitBounds(bounds, { padding: [40, 40] });
    }

    fetch(`last-position?deviceId=${encodeURIComponent(deviceId)}`)
      .then(r => r.json())
      .then(pos => { if (pos) map.setView([pos.lat, pos.lng], 13); })
      .catch(() => {});

    fetch('photos-list')
      .then(r => r.json())
      .then(allList => {
        allList.forEach(p => {
          if (p.deviceId === deviceId) {
            addMyPhotoMarker(p.lat, p.lng, p.url, p.timestamp, p.rating, p.comments);
          } else {
            addOtherPhotoMarker(p.lat, p.lng, p.url, p.timestamp, p.rating, p.comments);
          }
        });
        updatePhotoCount();
      })
      .catch(() => {});

    async function sendLocation(lat, lng, speed, accuracy) {
      try {
        await fetch('location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng, speed, accuracy, deviceId })
        });
      } catch (e) {
        console.error('送信エラー:', e);
      }
    }

    function startTracking() {
      if (!navigator.geolocation) {
        alert('このブラウザはGeolocationに対応していません');
        return;
      }
      points = [];
      polyline.setLatLngs([]);
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStop').disabled = false;
      setStatus('トラッキング中...');

      fetch('tracking', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({active: true, deviceId}) });

      watchId = navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lng, speed, accuracy } = pos.coords;
        const now = Date.now();
        currentLat = lat;
        currentLng = lng;

        points.push([lat, lng]);
        polyline.setLatLngs(points);
        map.setView([lat, lng]);

        if (marker) marker.setLatLng([lat, lng]);
        else marker = L.circleMarker([lat, lng], { radius: 8, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 1 }).addTo(map);

        showInfo(`📍 ${lat.toFixed(5)}, ${lng.toFixed(5)} | 精度: ${Math.round(accuracy)}m`);

        if (now - lastSent >= INTERVAL_MS) {
          lastSent = now;
          sendLocation(lat, lng, speed || 0, accuracy);
          setStatus(`送信済み ${new Date().toLocaleTimeString('ja-JP')}`);
        }
      }, err => {
        setStatus('位置情報エラー: ' + err.message);
      }, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      setStatus(`完了 - ${points.length}ポイント記録`);
      fetch('tracking', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({active: false, deviceId}) });
    }

    async function uploadPhoto(input) {
      const file = input.files[0];
      if (!file) return;

      setStatus('EXIF確認中...');

      let lat = null;
      let lng = null;
      let source = '';

      try {
        const gps = await exifr.gps(file);
        if (gps && gps.latitude && gps.longitude) {
          lat = gps.latitude;
          lng = gps.longitude;
          source = 'EXIF';
        }
      } catch (e) {}

      if (lat === null && currentLat !== null) {
        lat = currentLat;
        lng = currentLng;
        source = 'トラッキング位置';
      }

      if (lat === null) {
        setStatus('現在地取得中...');
        try {
          const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 })
          );
          lat = pos.coords.latitude;
          lng = pos.coords.longitude;
          source = '現在地';
        } catch (e) {
          alert('位置情報を取得できませんでした: ' + e.message);
          setStatus('待機中');
          input.value = '';
          return;
        }
      }

      setStatus(`アップロード中... (${source})`);
      try {
        const formData = new FormData();
        formData.append('photo', file);
        formData.append('lat', lat);
        formData.append('lng', lng);
        formData.append('deviceId', deviceId);

        const resp = await fetch('photo', { method: 'POST', body: formData });
        const data = await resp.json();

        addMyPhotoMarker(data.lat, data.lng, data.url, data.timestamp, 0, []);
        map.setView([data.lat, data.lng]);
        setStatus(`写真を追加しました（${source}）`);
        updatePhotoCount();
      } catch (e) {
        alert('アップロードに失敗しました: ' + e.message);
        setStatus('待機中');
      }
      input.value = '';
    }
  </script>
</body>
</html>
