<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPSトラッカー</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; }
    #header { background: #2c3e50; color: white; padding: 10px 16px; }
    #header-top { display: flex; justify-content: space-between; align-items: center; }
    #header h1 { font-size: 18px; }
    #btnToggle { flex: none; background: #7f8c8d; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    #btnToggle.active { background: #2980b9; }
    #status { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    #photo-count { font-size: 11px; margin-top: 2px; opacity: 0.7; }
    #controls { display: flex; gap: 8px; padding: 12px 16px; background: white; border-bottom: 1px solid #ddd; }
    #controls button { flex: 1; padding: 14px 4px; border: none; border-radius: 8px; font-size: clamp(13px, 4vw, 16px); font-weight: bold; cursor: pointer; white-space: nowrap; }
    #btnStart { background: #27ae60; color: white; }
    #btnStop  { background: #e74c3c; color: white; }
    #btnPhoto { background: #f39c12; color: white; }
    #btnAllPhotos { background: #8e44ad; color: white; }
    #controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    #map { height: calc(100vh - 150px); }
    #info { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; z-index: 1000; display: none; }

    /* 写真ポップアップ（評価のみ） */
    .photo-popup { min-width: 220px; }
    .photo-popup img { max-width: 220px; max-height: 140px; display: block; border-radius: 6px; }
    .photo-popup small { display: block; margin-top: 6px; color: #666; font-size: 11px; }
    .rating-row { display: flex; align-items: center; gap: 6px; margin: 6px 0 4px; }
    .rating-row .stars { flex: 1; font-size: 22px; line-height: 1; cursor: pointer; }
    .star { color: #ccc; transition: color 0.1s; }
    .star.filled { color: #f39c12; }
    .save-rating { background: #3498db; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; }
    /* コメントボタン（ポップアップ外・固定位置） */
    #float-comment-btn {
      display: none;
      position: fixed;
      bottom: 12px; left: 50%; transform: translateX(-50%);
      z-index: 2500;
      background: #2980b9; color: white; border: none;
      padding: 10px 24px; border-radius: 24px;
      font-size: 14px; font-weight: bold;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      cursor: pointer; white-space: nowrap;
    }

    /* チャットパネル（Leaflet の外・固定位置） */
    #chat-panel {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 2px solid #2c3e50;
      z-index: 3000;
      padding: 8px 12px 10px;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.2);
    }
    #chat-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    #chat-panel-title { font-size: 12px; color: #555; font-weight: bold; }
    #chat-panel-actions { display: flex; gap: 6px; align-items: center; }
    #chat-panel-refresh { background: none; border: none; font-size: 16px; cursor: pointer; padding: 0; line-height: 1; }
    #chat-panel-close { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 13px; cursor: pointer; }
    #chat-panel-messages { max-height: 120px; overflow-y: auto; padding: 4px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin-bottom: 8px; }
    .chat-empty { color: #bbb; font-size: 11px; text-align: center; padding: 6px; }
    .chat-msg { margin: 3px 0; display: flex; flex-direction: column; }
    .chat-msg.mine { align-items: flex-end; }
    .chat-msg.other { align-items: flex-start; }
    .chat-author { font-size: 10px; color: #999; margin-bottom: 1px; }
    .chat-bubble { display: inline-block; padding: 5px 10px; border-radius: 14px; font-size: 13px; max-width: 85%; word-break: break-word; line-height: 1.4; }
    .chat-msg.mine .chat-bubble { background: #27ae60; color: white; border-bottom-right-radius: 4px; }
    .chat-msg.other .chat-bubble { background: #ecf0f1; color: #2c3e50; border-bottom-left-radius: 4px; }
    .chat-time { font-size: 10px; color: #aaa; margin-top: 1px; }
    #chat-panel-input-row { display: flex; gap: 8px; align-items: flex-end; }
    #chat-panel-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 20px;
      resize: none;
      font-family: sans-serif;
      line-height: 1.4;
      max-height: 80px;
      overflow-y: auto;
    }
    #chat-panel-send { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; white-space: nowrap; font-weight: bold; }
    #chat-panel-send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-top">
      <h1>📍 GPSルートトラッカー</h1>
      <button id="btnToggle" onclick="toggleView()">👤 自分のみ</button>
    </div>
    <div id="status">待機中</div>
    <div id="photo-count" title="長押しでデバイスID確認" style="cursor:pointer"></div>
  </div>
  <div id="controls">
    <button id="btnStart" onclick="startTracking()">▶ スタート</button>
    <button id="btnStop"  onclick="stopTracking()" disabled>■ エンド</button>
    <button id="btnPhoto" onclick="document.getElementById('photoInput').click()">📷 写真</button>
    <button id="btnAllPhotos" onclick="showAllPhotos()">🗺 全表示</button>
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
  <div id="map"></div>
  <div id="info"></div>

  <!-- コメントボタン（ポップアップ外・固定位置） -->
  <button id="float-comment-btn" onclick="onFloatCommentClick()" style="display:none">💬 コメントを見る・書く</button>

  <!-- チャットパネル（Leaflet の外なのでブラウザ標準の入力が使える） -->
  <div id="chat-panel">
    <div id="chat-panel-header">
      <span id="chat-panel-title">💬 コメント</span>
      <div id="chat-panel-actions">
        <button id="chat-panel-refresh" onclick="refreshPanelComments()" title="最新コメントを取得">🔄</button>
        <button id="chat-panel-close" onclick="closeChatPanel()">✕ 閉じる</button>
      </div>
    </div>
    <div id="chat-panel-messages"></div>
    <div id="chat-panel-input-row">
      <textarea id="chat-panel-input" rows="1" placeholder="コメントを入力..." tabindex="0"></textarea>
      <button id="chat-panel-send" onclick="sendPanelComment()">送信</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/exifr/dist/lite.umd.js"></script>
  <script>
    function fnv1a(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
      }
      return h.toString(16).padStart(8, '0');
    }
    function computeDeviceId(name, pin) { return fnv1a(name + ':' + pin); }

    function saveDevice(id, name, pin) {
      localStorage.setItem('gps_device_id',   id);
      localStorage.setItem('gps_device_name', name);
      localStorage.setItem('gps_device_pin',  pin);
      const exp = new Date(Date.now() + 365 * 24 * 3600 * 1000).toUTCString();
      const opts = `; expires=${exp}; path=/; SameSite=Lax`;
      document.cookie = `gps_device_id=${encodeURIComponent(id)}${opts}`;
      document.cookie = `gps_device_name=${encodeURIComponent(name)}${opts}`;
      document.cookie = `gps_device_pin=${encodeURIComponent(pin)}${opts}`;
    }

    let deviceName = null;

    function getDeviceId() {
      let id   = localStorage.getItem('gps_device_id');
      let name = localStorage.getItem('gps_device_name');
      let pin  = localStorage.getItem('gps_device_pin');
      if (!id) {
        const mId   = document.cookie.match(/(?:^|;\s*)gps_device_id=([^;]+)/);
        const mName = document.cookie.match(/(?:^|;\s*)gps_device_name=([^;]+)/);
        const mPin  = document.cookie.match(/(?:^|;\s*)gps_device_pin=([^;]+)/);
        if (mId)   id   = decodeURIComponent(mId[1]);
        if (mName) name = decodeURIComponent(mName[1]);
        if (mPin)  pin  = decodeURIComponent(mPin[1]);
      }
      if (!id) {
        let n = '';
        while (!n) {
          n = (prompt(
            'このデバイスの名前を入力してください\n（例: tanaka, iphone-yoshiki）\n\n' +
            'キャッシュクリアしても同じ名前+PINを入力すれば写真が自分のものとして表示されます。'
          ) || '').trim();
        }
        let p = '';
        while (!p) {
          const entered = (prompt(
            '4桁のPINを設定してください\n（例: 1234）\n\n' +
            '他の人が同じ名前を使えないようにするためのパスワードです。'
          ) || '').trim();
          if (/^\d{4}$/.test(entered)) p = entered;
          else if (entered) alert('4桁の数字を入力してください');
        }
        id = computeDeviceId(n, p);
        name = n; pin = p;
        saveDevice(id, name, pin);
      }
      deviceName = name || id.slice(0, 8);
      return id;
    }
    let deviceId = getDeviceId();

    // photo-count 長押し → deviceId 確認・変更
    (() => {
      const el = document.getElementById('photo-count');
      let timer;
      el.addEventListener('pointerdown', () => { timer = setTimeout(showDeviceIdDialog, 800); });
      el.addEventListener('pointerup',   () => clearTimeout(timer));
      el.addEventListener('pointerleave',() => clearTimeout(timer));
    })();

    function showDeviceIdDialog() {
      const enteredPin = (prompt(`デバイス名: ${deviceName}\n\nPINを入力して確認してください`) || '').trim();
      if (!enteredPin) return;
      const storedPin = localStorage.getItem('gps_device_pin') || '';
      const valid = (storedPin && enteredPin === storedPin) ||
                    computeDeviceId(deviceName, enteredPin) === deviceId;
      if (!valid) { alert('PINが違います'); return; }

      const action = prompt(
        '認証OK ✓\n\n操作を選択してください:\n' +
        '1 → 名前/PINを変更\n' +
        '2 → 旧IDから写真を引き継ぐ\n' +
        '（空欄でキャンセル）'
      );

      if (action === '1') {
        const newName = (prompt('新しいデバイス名（空欄で現在のまま）', deviceName) || '').trim() || deviceName;
        let newPin = enteredPin;
        const pc = (prompt('新しいPIN（4桁、空欄で現在のまま）') || '').trim();
        if (pc) {
          if (!/^\d{4}$/.test(pc)) { alert('4桁の数字を入力してください'); return; }
          newPin = pc;
        }
        const newId = computeDeviceId(newName, newPin);
        if (newId === deviceId) { alert('変更はありません'); return; }
        const migrate = confirm('登録済みの写真を新しい設定に引き継ぎますか？');
        if (migrate) {
          fetch('rename-device', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oldId: deviceId, newId }),
          }).then(r => r.json()).then(d => {
            saveDevice(newId, newName, newPin);
            alert(`${d.updated}件引き継ぎました。再読み込みします。`);
            location.reload();
          });
        } else {
          saveDevice(newId, newName, newPin);
          alert('設定を変更しました。再読み込みします。');
          location.reload();
        }
      } else if (action === '2') {
        fetch('device-ids').then(r => r.json()).then(list => {
          const others = list.filter(d => d.deviceId !== deviceId);
          if (others.length === 0) { alert('引き継ぐ写真が見つかりません'); return; }
          let msg = '引き継ぐIDを番号で選択してください:\n\n';
          others.forEach((d, i) => {
            msg += `${i + 1}  ${d.deviceId.slice(0, 16)}... (${d.count}件)\n`;
          });
          msg += '\n（番号を入力、空欄でキャンセル）';
          const sel = (prompt(msg) || '').trim();
          const idx = parseInt(sel, 10) - 1;
          if (isNaN(idx) || idx < 0 || idx >= others.length) return;
          fetch('rename-device', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oldId: others[idx].deviceId, newId: deviceId }),
          }).then(r => r.json()).then(d => {
            alert(`${d.updated}件の写真を引き継ぎました。再読み込みします。`);
            location.reload();
          });
        });
      }
    }

    const map = L.map('map').setView([43.0646, 141.3468], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let watchId = null;
    let polyline = L.polyline([], { color: '#e74c3c', weight: 4 }).addTo(map);
    let marker = null;
    let points = [];
    let startFlagMarker = null, endFlagMarker = null;
    let trackingStartTime = null;

    const startFlagIcon = L.divIcon({
      html: '<div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;">🚩</div>',
      className: '', iconSize: [28, 28], iconAnchor: [3, 27],
    });
    const endFlagIcon = L.divIcon({
      html: '<div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;">🏁</div>',
      className: '', iconSize: [28, 28], iconAnchor: [14, 27],
    });
    const INTERVAL_MS = 5000;
    let lastSent = 0;
    let currentLat = null, currentLng = null;

    const myPhotoIcon = L.divIcon({
      html: '<div style="background:#e67e22;border:2px solid white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 5px rgba(0,0,0,0.5);">📷</div>',
      className: '', iconSize: [34,34], iconAnchor: [17,17], popupAnchor: [0,-19],
    });
    const otherPhotoIcon = L.divIcon({
      html: '<div style="background:#2980b9;border:2px solid white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 5px rgba(0,0,0,0.5);">📷</div>',
      className: '', iconSize: [34,34], iconAnchor: [17,17], popupAnchor: [0,-19],
    });

    function setStatus(t) { document.getElementById('status').textContent = t; }
    function showInfo(t) { const el = document.getElementById('info'); el.textContent = t; el.style.display = 'block'; }
    function escapeHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function buildStars(rating) {
      return [1,2,3,4,5].map(i =>
        `<span class="star ${i<=(rating||0)?'filled':''}" data-val="${i}">★</span>`
      ).join('');
    }

    // ── チャットパネル（Leaflet の外） ──────────────────────────
    let currentPhotoUrl = null;

    function renderPanelComments(comments) {
      const el = document.getElementById('chat-panel-messages');
      if (!comments || comments.length === 0) {
        el.innerHTML = '<div class="chat-empty">コメントはまだありません</div>';
        return;
      }
      el.innerHTML = comments.map(c => {
        const isMe = c.deviceId === deviceId;
        const time = new Date(c.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const author = isMe ? 'あなた' : (c.authorName || c.deviceId.slice(0, 8));
        return `<div class="chat-msg ${isMe?'mine':'other'}">
          ${!isMe ? `<div class="chat-author">${escapeHtml(author)}</div>` : ''}
          <div class="chat-bubble">${escapeHtml(c.text)}</div>
          <div class="chat-time">${time}</div>
        </div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function openChatPanel(url, time) {
      currentPhotoUrl = url;
      document.getElementById('chat-panel-title').textContent = `💬 コメント（${time}）`;
      document.getElementById('chat-panel').style.display = 'block';
      await refreshPanelComments();
      // PC（マウスあり）のみ自動フォーカス。スマホは仮想キーボードが勝手に開かないよう除外
      if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
        setTimeout(() => document.getElementById('chat-panel-input').focus(), 50);
      }
    }

    function closeChatPanel() {
      document.getElementById('chat-panel').style.display = 'none';
      currentPhotoUrl = null;
      // ポップアップが開いたままならコメントボタンを再表示
      if (currentPopupUrl) {
        document.getElementById('float-comment-btn').style.display = 'block';
      }
    }

    async function refreshPanelComments() {
      if (!currentPhotoUrl) return;
      const btn = document.getElementById('chat-panel-refresh');
      btn.textContent = '⏳';
      try {
        const r = await fetch(`photo-detail?url=${encodeURIComponent(currentPhotoUrl)}`);
        const photo = await r.json();
        const cached = photoMeta.get(currentPhotoUrl) || {};
        photoMeta.set(currentPhotoUrl, { ...cached, comments: photo.comments || [] });
        renderPanelComments(photo.comments || []);
      } catch (_) {}
      btn.textContent = '🔄';
    }

    async function sendPanelComment() {
      const input = document.getElementById('chat-panel-input');
      const text = input.value.trim();
      if (!text || !currentPhotoUrl) return;
      input.value = '';
      const sendBtn = document.getElementById('chat-panel-send');
      sendBtn.disabled = true;
      try {
        await fetch('photo-comment', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ url: currentPhotoUrl, deviceId, authorName: deviceName, text }),
        });
        await refreshPanelComments();
      } catch (_) {}
      sendBtn.disabled = false;
      input.focus();
    }

    document.getElementById('chat-panel-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPanelComment(); }
    });

    // ── 写真マーカー ─────────────────────────────────────────────
    let photoMarkers = [], otherMarkers = [], showAll = false;
    const photoMeta = new Map();

    function addPhotoMarker(lat, lng, url, timestamp, rating, comments, photoDeviceId) {
      photoMeta.set(url, { rating: rating || 0, comments: comments || [], photoDeviceId });
      const time = new Date(timestamp).toLocaleString('ja-JP');
      const isOwn = photoDeviceId === deviceId;
      const icon = isOwn ? myPhotoIcon : otherPhotoIcon;

      // HTML文字列ではなくDOM要素でポップアップを構築
      // → Leaflet が innerHTML をリセットしないため isOwn 判定が初回から確実に効く
      const content = document.createElement('div');
      content.className = 'photo-popup';
      content.dataset.url = url;
      content.dataset.time = time;
      content.dataset.photoDevice = photoDeviceId || '';

      const imgEl = document.createElement('img');
      imgEl.src = url;
      content.appendChild(imgEl);

      const ratingRow = document.createElement('div');
      ratingRow.className = 'rating-row';

      const starsEl = document.createElement('div');
      starsEl.className = 'stars';
      starsEl.innerHTML = buildStars(rating || 0);
      starsEl.style.cursor = isOwn ? 'pointer' : 'default';
      ratingRow.appendChild(starsEl);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-rating';
      saveBtn.textContent = '★保存';
      saveBtn.style.display = isOwn ? '' : 'none';  // マーカー作成時に確定
      ratingRow.appendChild(saveBtn);

      content.appendChild(ratingRow);

      const timeEl = document.createElement('small');
      timeEl.textContent = time;
      content.appendChild(timeEl);

      if (isOwn) {
        starsEl.onclick = function(ev) {
          const star = ev.target.closest('.star');
          if (!star) return;
          const newRating = parseInt(star.dataset.val);
          starsEl.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', i < newRating));
          content.dataset.pendingRating = newRating;
        };
        saveBtn.onclick = function() {
          const r = content.dataset.pendingRating !== undefined
            ? parseInt(content.dataset.pendingRating)
            : starsEl.querySelectorAll('.star.filled').length;
          fetch('photo-meta', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ url, rating: r, deviceId }),
          }).then(res => res.json()).then(() => {
            const cached = photoMeta.get(url) || {};
            photoMeta.set(url, { ...cached, rating: r });
            delete content.dataset.pendingRating;
            saveBtn.textContent = '✓保存';
            setTimeout(() => { saveBtn.textContent = '★保存'; }, 2000);
          }).catch(() => { saveBtn.textContent = 'エラー'; });
        };
      }

      const m = L.marker([lat, lng], { icon })
        .bindPopup(content, { maxWidth: 260 })
        .addTo(map);
      return m;
    }

    // ポップアップが開いているときの url/time を保持
    let currentPopupUrl = null, currentPopupTime = null, currentPopupObj = null;

    function onFloatCommentClick() {
      if (!currentPopupUrl) return;
      document.getElementById('float-comment-btn').style.display = 'none';
      openChatPanel(currentPopupUrl, currentPopupTime).then(() => {
        // パネル描画後にポップアップ位置を調整
        setTimeout(() => {
          const pEl = currentPopupObj && currentPopupObj.getElement();
          const chatPanel = document.getElementById('chat-panel');
          if (!pEl || !chatPanel || chatPanel.style.display === 'none') return;
          const popupRect = pEl.getBoundingClientRect();
          const panelTop  = chatPanel.getBoundingClientRect().top;
          const topBar    = document.getElementById('header').offsetHeight
                          + document.getElementById('controls').offsetHeight;
          let dy = 0;
          if (popupRect.bottom > panelTop - 8)  dy = popupRect.bottom - panelTop + 16;
          if (popupRect.top    < topBar   + 8)  dy = -(topBar + 12 - popupRect.top);
          if (dy !== 0) map.panBy([0, dy], { animate: true, duration: 0.3 });
        }, 80);
      });
    }

    map.on('popupopen', async function(e) {
      map.dragging.disable();
      if (map.keyboard) map.keyboard.disable();

      const popupEl = e.popup.getElement();
      const popup = popupEl && popupEl.querySelector('.photo-popup');
      if (!popup) return;
      currentPopupUrl  = popup.dataset.url;
      currentPopupTime = popup.dataset.time;
      currentPopupObj  = e.popup;

      // 画像ロード後にポップアップを再計算してヘッダー分だけパン補正
      const img = popup.querySelector('img');
      if (img && !img.complete) {
        img.onload = () => {
          if (!currentPopupObj) return;
          currentPopupObj.update();
          const el = currentPopupObj.getElement();
          if (!el) return;
          const rect = el.getBoundingClientRect();
          const topBar = document.getElementById('header').offsetHeight
                       + document.getElementById('controls').offsetHeight;
          if (rect.top < topBar + 8) {
            map.panBy([0, -(topBar + 12 - rect.top)], { animate: true, duration: 0.3 });
          }
        };
      }

      // コメントボタンを表示（チャットパネルが閉じているときのみ）
      if (document.getElementById('chat-panel').style.display !== 'block') {
        document.getElementById('float-comment-btn').style.display = 'block';
      }

      // saveBtn の show/hide・onclick は addPhotoMarker 時点で確定済み
      // ここではサーバーから最新評価を取得してユーザー未操作時のみ星表示を更新
      const starsEl = popup.querySelector('.stars');
      const hasPending = popup.dataset.pendingRating !== undefined;

      try {
        const r = await fetch(`photo-detail?url=${encodeURIComponent(currentPopupUrl)}`);
        const photo = await r.json();
        const serverRating = photo.rating || 0;
        const cached = photoMeta.get(currentPopupUrl) || {};
        photoMeta.set(currentPopupUrl, { ...cached, rating: serverRating, comments: photo.comments || [] });
        if (!hasPending && starsEl && currentPopupUrl) {
          starsEl.innerHTML = buildStars(serverRating);
        }
      } catch (_) {}
    });

    map.on('popupclose', function() {
      map.dragging.enable();
      if (map.keyboard) map.keyboard.enable();
      currentPopupUrl = null; currentPopupTime = null; currentPopupObj = null;
      document.getElementById('float-comment-btn').style.display = 'none';
      closeChatPanel();
    });

    function addMyPhotoMarker(lat, lng, url, ts, rating, comments, photoDeviceId) {
      const m = addPhotoMarker(lat, lng, url, ts, rating, comments, photoDeviceId || deviceId);
      if (m) photoMarkers.push(m);
    }
    function addOtherPhotoMarker(lat, lng, url, ts, rating, comments, photoDeviceId) {
      const m = addPhotoMarker(lat, lng, url, ts, rating, comments, photoDeviceId || 'unknown');
      if (m) { m.remove(); otherMarkers.push(m); }
    }

    function toggleView() {
      showAll = !showAll;
      const btn = document.getElementById('btnToggle');
      if (showAll) {
        otherMarkers.forEach(m => m.addTo(map));
        btn.textContent = '🌐 全員分'; btn.classList.add('active');
      } else {
        otherMarkers.forEach(m => m.remove());
        btn.textContent = '👤 自分のみ'; btn.classList.remove('active');
      }
      updatePhotoCount();
    }

    function updatePhotoCount() {
      const my = photoMarkers.length, total = my + otherMarkers.length;
      document.getElementById('photo-count').textContent = total === 0 ? '' :
        showAll ? `📷 全${total}件（自分${my} / 他${otherMarkers.length}）` :
                  `📷 自分${my}件（全${total}件）`;
    }

    function showAllPhotos() {
      const visible = showAll ? [...photoMarkers, ...otherMarkers] : photoMarkers;
      if (!visible.length) return;
      map.fitBounds(L.latLngBounds(visible.map(m => m.getLatLng())), { padding:[40,40] });
    }

    fetch(`last-position?deviceId=${encodeURIComponent(deviceId)}`)
      .then(r => r.json()).then(pos => { if (pos) map.setView([pos.lat, pos.lng], 13); }).catch(() => {});

    fetch('photos-list').then(r => r.json()).then(list => {
      list.forEach(p => {
        if (p.deviceId === deviceId) addMyPhotoMarker(p.lat, p.lng, p.url, p.timestamp, p.rating, p.comments, p.deviceId);
        else addOtherPhotoMarker(p.lat, p.lng, p.url, p.timestamp, p.rating, p.comments, p.deviceId);
      });
      updatePhotoCount();
    }).catch(() => {});

    function drawSavedRoute(route, isOwn) {
      const pts = route.points;
      if (!pts || pts.length === 0) return;
      const color = isOwn ? '#e74c3c' : '#3498db';
      const label = route.authorName || (isOwn ? deviceName : route.deviceId.slice(0, 8));
      const startT = route.startTime ? new Date(route.startTime).toLocaleString('ja-JP') : '';
      const endT   = route.endTime   ? new Date(route.endTime).toLocaleString('ja-JP')   : '';
      if (pts.length >= 2) {
        L.polyline(pts, { color, weight: 3, opacity: 0.75 })
          .bindPopup(`<b>${isOwn ? 'あなた' : escapeHtml(label)}</b><br>${startT} 〜 ${endT}<br>${pts.length} ポイント`)
          .addTo(map);
      }
      L.marker(pts[0], { icon: startFlagIcon, zIndexOffset: 90 })
        .bindPopup(`🚩 スタート<br>${escapeHtml(label)}<br>${startT}`)
        .addTo(map);
      if (pts.length > 1) {
        L.marker(pts[pts.length - 1], { icon: endFlagIcon, zIndexOffset: 90 })
          .bindPopup(`🏁 ゴール<br>${escapeHtml(label)}<br>${endT}`)
          .addTo(map);
      }
    }

    fetch('routes-list').then(r => r.json()).then(list => {
      list.forEach(r => drawSavedRoute(r, r.deviceId === deviceId));
    }).catch(() => {});

    async function sendLocation(lat, lng, speed, accuracy) {
      try {
        await fetch('location', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ lat, lng, speed, accuracy, deviceId }) });
      } catch (e) { console.error('送信エラー:', e); }
    }

    function startTracking() {
      if (!navigator.geolocation) { alert('このブラウザはGeolocationに対応していません'); return; }
      points = []; polyline.setLatLngs([]);
      trackingStartTime = new Date().toISOString();
      if (startFlagMarker) { startFlagMarker.remove(); startFlagMarker = null; }
      if (endFlagMarker)   { endFlagMarker.remove();   endFlagMarker = null; }
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStop').disabled = false;
      setStatus('トラッキング中...');
      fetch('tracking', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({active:true, deviceId}) });
      // getCurrentPosition でスタート旗を即時配置（PC等 watchPosition が遅い環境の補完）
      navigator.geolocation.getCurrentPosition(pos => {
        if (!startFlagMarker) {
          const { latitude: lat, longitude: lng } = pos.coords;
          map.setView([lat, lng]);
          startFlagMarker = L.marker([lat, lng], { icon: startFlagIcon, zIndexOffset: 100 }).addTo(map);
        }
      }, null, { enableHighAccuracy: false, maximumAge: 30000 });
      watchId = navigator.geolocation.watchPosition(pos => {
        const { latitude:lat, longitude:lng, speed, accuracy } = pos.coords;
        const now = Date.now();
        currentLat = lat; currentLng = lng;
        points.push([lat, lng]); polyline.setLatLngs(points); map.setView([lat, lng]);
        if (points.length === 1 && !startFlagMarker) {
          // getCurrentPosition が失敗した場合のフォールバック
          startFlagMarker = L.marker([lat, lng], { icon: startFlagIcon, zIndexOffset: 100 }).addTo(map);
        }
        if (marker) marker.setLatLng([lat, lng]);
        else marker = L.circleMarker([lat, lng], { radius:8, color:'#e74c3c', fillColor:'#e74c3c', fillOpacity:1 }).addTo(map);
        showInfo(`📍 ${lat.toFixed(5)}, ${lng.toFixed(5)} | 精度: ${Math.round(accuracy)}m`);
        if (now - lastSent >= INTERVAL_MS) {
          lastSent = now; sendLocation(lat, lng, speed||0, accuracy);
          setStatus(`送信済み ${new Date().toLocaleTimeString('ja-JP')}`);
        }
      }, err => setStatus('位置情報エラー: ' + err.message), { enableHighAccuracy:true, maximumAge:0 });
    }

    function stopTracking() {
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      setStatus(`完了 - ${points.length}ポイント記録`);
      fetch('tracking', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({active:false, deviceId}) });
      if (points.length >= 1) {
        fetch('route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            deviceId, authorName: deviceName, points,
            startTime: trackingStartTime, endTime: new Date().toISOString(),
          }),
        }).then(r => r.json()).then(saved => {
          // ライブ表示をクリアして保存済みスタイルで再描画
          if (startFlagMarker) { startFlagMarker.remove(); startFlagMarker = null; }
          if (endFlagMarker)   { endFlagMarker.remove();   endFlagMarker = null; }
          if (marker)          { marker.remove();           marker = null; }
          polyline.setLatLngs([]);
          drawSavedRoute(saved, true);
          setStatus(`保存完了 - ${points.length}ポイント`);
        }).catch(() => {
          // 保存失敗時はライブ表示のまま
          if (points.length > 0) {
            endFlagMarker = L.marker(points[points.length - 1], { icon: endFlagIcon, zIndexOffset: 100 }).addTo(map);
          }
        });
      }
    }

    async function uploadPhoto(input) {
      const file = input.files[0]; if (!file) return;
      setStatus('EXIF確認中...');
      let lat = null, lng = null, source = '';
      try {
        const gps = await exifr.gps(file);
        if (gps && gps.latitude) { lat = gps.latitude; lng = gps.longitude; source = 'EXIF'; }
      } catch (_) {}
      if (lat === null && currentLat !== null) { lat = currentLat; lng = currentLng; source = 'トラッキング位置'; }
      if (lat === null) {
        setStatus('現在地取得中...');
        try {
          const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy:true, timeout:10000 }));
          lat = pos.coords.latitude; lng = pos.coords.longitude; source = '現在地';
        } catch (e) { alert('位置情報を取得できませんでした: ' + e.message); setStatus('待機中'); input.value=''; return; }
      }
      setStatus(`アップロード中... (${source})`);
      try {
        const fd = new FormData();
        fd.append('photo', file); fd.append('lat', lat); fd.append('lng', lng); fd.append('deviceId', deviceId);
        const resp = await fetch('photo', { method:'POST', body:fd });
        const data = await resp.json();
        addMyPhotoMarker(data.lat, data.lng, data.url, data.timestamp, 0, [], data.deviceId);
        map.setView([data.lat, data.lng]);
        setStatus(`写真を追加しました（${source}）`);
        updatePhotoCount();
      } catch (e) { alert('アップロードに失敗しました: ' + e.message); setStatus('待機中'); }
      input.value = '';
    }
  </script>
</body>
