name: iot-fiware

services:
  line-server:
    build: ./line-server
    container_name: iot-fiware-line-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - photos:/app/photos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fiware-base-net
      - default

  gps-tracker:
    build: ./gps-tracker
    container_name: iot-fiware-gps-tracker
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - ORION_URL=http://orion:1026
    volumes:
      - gps_photos:/app/public/photos
      - gps_data:/app/data
    networks:
      - fiware-base-net
      - default

volumes:
  photos:
    external: true
    name: line_picarx_photos
  gps_photos:
    name: iot_fiware_gps_photos
  gps_data:
    name: iot_fiware_gps_data

networks:
  fiware-base-net:
    external: true
    name: fiware-base-net
